<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maayan's Game World</title>
  <style>
    :root {
      --ink: #17324d;
      --bg: #fff6dc;
      --card: rgba(255, 255, 255, 0.82);
      --panel: rgba(255, 255, 255, 0.86);
      --shadow: rgba(23, 50, 77, 0.18);
      --good: #2b9b63;
      --warn: #d96b3b;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Verdana", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 183, 3, 0.45), transparent 30%),
        radial-gradient(circle at top right, rgba(132, 216, 255, 0.5), transparent 24%),
        linear-gradient(180deg, #fffdf4 0%, var(--bg) 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image:
        radial-gradient(circle, rgba(255, 93, 115, 0.9) 0 0.35rem, transparent 0.36rem),
        radial-gradient(circle, rgba(255, 183, 3, 0.85) 0 0.25rem, transparent 0.26rem),
        radial-gradient(circle, rgba(132, 216, 255, 0.9) 0 0.28rem, transparent 0.29rem),
        radial-gradient(circle, rgba(155, 231, 196, 0.95) 0 0.3rem, transparent 0.31rem);
      background-size: 15rem 15rem, 17rem 17rem, 19rem 19rem, 21rem 21rem;
      opacity: 0.45;
      animation: confetti-drift 18s linear infinite;
    }

    body::after {
      background-image:
        radial-gradient(circle, rgba(255, 93, 115, 0.9) 0 0.35rem, transparent 0.36rem),
        radial-gradient(circle, rgba(255, 183, 3, 0.85) 0 0.25rem, transparent 0.26rem),
        radial-gradient(circle, rgba(132, 216, 255, 0.9) 0 0.28rem, transparent 0.29rem),
        radial-gradient(circle, rgba(155, 231, 196, 0.95) 0 0.3rem, transparent 0.31rem);
      background-size: 15rem 15rem, 17rem 17rem, 19rem 19rem, 21rem 21rem;
      opacity: 0.45;
      animation: confetti-sway 24s linear infinite;
      transform: rotate(12deg);
    }

    button {
      font: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 1rem));
      margin: 0 auto;
      padding: 1rem 0 2rem;
    }

    .hide {
      display: none !important;
    }

    .hero-box {
      padding: 1rem;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 18px 34px var(--shadow);
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      text-transform: uppercase;
      font-size: clamp(2rem, 5vw, 4.2rem);
      line-height: 0.95;
      letter-spacing: 0.05em;
      text-shadow: 0 4px 0 rgba(255, 255, 255, 0.65);
    }

    .subtitle {
      width: fit-content;
      max-width: 100%;
      margin: 0.9rem auto 0;
      padding: 1rem 1.25rem;
      background: linear-gradient(135deg, rgba(255, 199, 224, 0.95), rgba(255, 157, 197, 0.92));
      border: 3px solid rgba(255, 255, 255, 0.78);
      border-radius: 28px;
      box-shadow: 0 14px 28px rgba(255, 105, 160, 0.22);
      font-size: clamp(1rem, 2vw, 1.1rem);
      color: #8c1f56;
      font-weight: 700;
      white-space: pre-line;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .card {
      display: block;
      width: 100%;
      min-height: 240px;
      padding: 1rem;
      border: 0;
      border-radius: 28px;
      text-align: left;
      color: inherit;
      background: var(--card);
      box-shadow: 0 18px 34px var(--shadow);
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease;
      cursor: pointer;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px) rotate(1deg);
      box-shadow: 0 24px 38px rgba(23, 50, 77, 0.24);
      background: rgba(255, 255, 255, 0.92);
      outline: none;
    }

    .art {
      display: grid;
      place-items: center;
      height: 130px;
      margin-bottom: 0.9rem;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.2)),
        rgba(255, 255, 255, 0.3);
      font-size: 4rem;
    }

    .name {
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 1.05rem;
    }

    .game-name {
      margin: 0.45rem 0 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .note {
      margin: 0.45rem 0 0;
      font-size: 0.92rem;
      opacity: 0.82;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .back,
    .pill,
    .action {
      border: 0;
      border-radius: 999px;
      padding: 0.85rem 1rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 10px 20px var(--shadow);
      color: var(--ink);
    }

    .back,
    .action {
      cursor: pointer;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 1rem;
    }

    .action.primary {
      color: white;
      background: linear-gradient(135deg, #ff7f99, #ffb04d);
      box-shadow: 0 12px 20px rgba(255, 127, 153, 0.3);
    }

    .action.primary.start-attention {
      animation: start-bounce 0.9s ease-in-out infinite, start-rainbow 2.8s linear infinite;
      box-shadow: 0 16px 28px rgba(255, 127, 153, 0.38);
    }

    .action.secondary {
      color: white;
      background: linear-gradient(135deg, #5d9df7, #70d6ff);
      box-shadow: 0 12px 20px rgba(93, 157, 247, 0.3);
    }

    .status {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .game-shell {
      display: grid;
      gap: 1rem;
    }

    .game-area {
      position: relative;
      min-height: 430px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 22px 38px var(--shadow);
      touch-action: none;
    }

    .instructions,
    .message {
      padding: 1rem 1.1rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: 0 16px 28px var(--shadow);
    }

    .instructions strong {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.95rem;
    }

    .message {
      min-height: 56px;
      text-align: center;
      font-weight: 700;
      color: var(--warn);
    }

    .center-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
    }

    .maze-stage {
      place-items: start center;
      overflow: auto;
      padding: 1rem 0 1.5rem;
    }

    .sprite {
      position: absolute;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .sky {
      background: linear-gradient(180deg, #bde9ff, #fffef6);
    }

    .space {
      background: radial-gradient(circle at top, #284b86, #111d35 64%);
    }

    .pond {
      background: linear-gradient(180deg, #d5f8b9, #79d5ff 62%, #57b0e3);
    }

    .ocean {
      background: linear-gradient(180deg, #dff8ff, #8ad8ff 40%, #44a4df);
    }

    .rainbow {
      background: linear-gradient(135deg, #ffb4d1, #ffd86b, #8cf2d0, #89c7ff);
    }

    .kitchen {
      background: linear-gradient(180deg, #fff2d3, #ffcba6);
    }

    .club {
      background: radial-gradient(circle at top, #49306c, #180d2b 64%);
    }

    .circus {
      background: linear-gradient(180deg, #fff0a6, #ffb5bf);
    }

    .movie {
      background: linear-gradient(180deg, #ffe5b5, #ffb36e);
    }

    .sunny {
      background: linear-gradient(180deg, #ffe27c, #ff9f6e);
    }

    .floor {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 54px;
      background: rgba(23, 50, 77, 0.12);
    }

    .juggler {
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      font-size: 4rem;
    }

    .ball {
      font-size: 2rem;
    }

    .rocket {
      font-size: 3.2rem;
      left: 24px;
      top: 50%;
      transform: translateY(-50%);
    }

    .rocket-item {
      font-size: 2rem;
    }

    .frog {
      font-size: 3.2rem;
      transition: left 240ms ease, top 240ms ease;
    }

    .pad {
      width: 78px;
      height: 32px;
      border-radius: 50%;
      background: #72bb4a;
      border: 4px solid #4c8f2f;
      box-shadow: inset -10px -4px rgba(0, 0, 0, 0.08);
      cursor: pointer;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .bucket-zone {
      position: absolute;
      bottom: 24px;
      width: 28%;
      min-height: 128px;
      padding-top: 64px;
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.4);
      border: 3px dashed rgba(23, 50, 77, 0.24);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .bucket-zone .bucket-emoji {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.3rem;
    }

    .draggable {
      font-size: 2.2rem;
      cursor: grab;
      touch-action: none;
    }

    .maze-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.55rem;
      width: min(92vw, 520px);
      margin: 0 auto;
    }

    .maze-cell {
      aspect-ratio: 1;
      border-radius: 18px;
      border: 2px solid rgba(23, 50, 77, 0.12);
      background: rgba(255, 255, 255, 0.52);
      display: grid;
      place-items: center;
      font-size: 2rem;
      cursor: pointer;
    }

    .maze-cell.wall {
      background: rgba(23, 50, 77, 0.2);
      cursor: not-allowed;
    }

    .maze-cell.sparkle {
      background: rgba(255, 255, 255, 0.84);
    }

    .pizza-base {
      width: min(78vw, 360px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, #f4b85b 0 62%, #c97b2f 63% 72%, transparent 73%);
      margin: 0 auto;
      position: relative;
      box-shadow: inset 0 0 0 18px rgba(255, 122, 61, 0.45);
    }

    .pizza-slot {
      position: absolute;
      width: 76px;
      height: 76px;
      margin: -38px 0 0 -38px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.34);
      border: 3px dashed rgba(23, 50, 77, 0.22);
      font-size: 2rem;
    }

    .tray {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      padding: 1rem;
    }

    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(68px, 1fr));
      gap: 0.75rem;
      width: min(92vw, 420px);
      margin: 0 auto;
      padding-top: 1rem;
    }

    .memory-pad {
      aspect-ratio: 1;
      border-radius: 20px;
      border: 0;
      cursor: pointer;
      opacity: 0.92;
    }

    .memory-pad.active {
      transform: scale(1.06);
      filter: brightness(1.25);
    }

    .balloon {
      font-size: 2.5rem;
      animation: bob 1.5s ease-in-out infinite;
    }

    .balloon-burst {
      position: absolute;
      width: 90px;
      height: 90px;
      pointer-events: none;
      z-index: 7;
    }

    .balloon-spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 12px;
      height: 12px;
      margin: -6px 0 0 -6px;
      border-radius: 999px;
      animation: balloon-burst 520ms ease-out forwards;
    }

    .bucket {
      bottom: 18px;
      transform: translateX(-50%);
      font-size: 3.2rem;
    }

    .pop {
      font-size: 2.1rem;
    }

    .heat-bar {
      width: min(90vw, 380px);
      height: 22px;
      margin: 0.5rem auto 0;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 0 0 2px rgba(23, 50, 77, 0.12);
    }

    .heat-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #57c1ff, #ffd154, #ff7c5a);
      transition: width 120ms linear;
    }

    .cool-item {
      font-size: 2.2rem;
      animation: bob 1.8s ease-in-out infinite;
    }

    .win-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 8;
    }

    .win-trophy {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(4rem, 18vw, 8rem);
      line-height: 1;
      filter: drop-shadow(0 12px 18px rgba(23, 50, 77, 0.28));
      animation: trophy-spin 3s ease-in-out forwards;
    }

    .win-banner {
      position: absolute;
      left: 50%;
      top: calc(50% - 92px);
      transform: translateX(-50%);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255, 241, 168, 0.98), rgba(255, 179, 77, 0.96));
      border: 3px solid rgba(255, 255, 255, 0.92);
      color: #8a3a00;
      font-size: clamp(1.1rem, 4vw, 1.8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 24px rgba(23, 50, 77, 0.2);
      animation: win-banner-pop 3s ease-in-out forwards;
    }

    .win-confetti {
      position: absolute;
      top: -14%;
      width: 14px;
      height: 26px;
      border-radius: 999px;
      opacity: 0.95;
      animation: win-confetti-fall 3s linear forwards;
    }

    .lose-overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 1rem;
      background: rgba(23, 50, 77, 0.18);
      z-index: 9;
    }

    .lose-card {
      width: min(92%, 360px);
      padding: 1.2rem 1rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 18px 34px rgba(23, 50, 77, 0.22);
      text-align: center;
    }

    .lose-banner {
      margin: 0;
      color: #9b2445;
      font-size: clamp(1.3rem, 5vw, 2rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .lose-text {
      margin: 0.7rem 0 0;
      font-size: 0.98rem;
    }

    .lose-restart {
      margin-top: 0.95rem;
    }

    .footer-note {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.94rem;
      opacity: 0.8;
    }

    .form-section {
      margin-top: 1.25rem;
      padding: 0.45rem;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 18px 34px var(--shadow);
      text-align: center;
    }

    .form-frame {
      width: 100%;
      max-width: 640px;
      height: 620px;
      border: 0;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.72);
    }

    .start-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      text-align: center;
    }

    .start-card {
      max-width: 34rem;
      padding: 1.4rem 1.2rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 18px 30px rgba(23, 50, 77, 0.16);
    }

    .start-emoji {
      font-size: clamp(4rem, 10vw, 5.5rem);
      line-height: 1;
    }

    .start-title {
      margin: 0.6rem 0 0;
      font-size: clamp(1.4rem, 3vw, 2rem);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .start-text {
      margin: 0.55rem 0 0;
      font-size: 1rem;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes balloon-burst {
      0% {
        transform: rotate(var(--angle)) translateY(0) scale(0.35);
        opacity: 1;
      }
      100% {
        transform: rotate(var(--angle)) translateY(-38px) scale(1.1);
        opacity: 0;
      }
    }

    @keyframes start-bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.06); }
    }

    @keyframes start-rainbow {
      0% { background: linear-gradient(135deg, #ff7f99, #ffb04d); }
      25% { background: linear-gradient(135deg, #ff6ea8, #ffd154); }
      50% { background: linear-gradient(135deg, #67d7c4, #70d6ff); }
      75% { background: linear-gradient(135deg, #8f7bff, #ff93c1); }
      100% { background: linear-gradient(135deg, #ff7f99, #ffb04d); }
    }

    @keyframes trophy-spin {
      0% {
        transform: translate(-50%, -50%) scale(0.2) rotate(0deg);
        opacity: 0;
      }
      20% {
        transform: translate(-50%, -50%) scale(1.15) rotate(220deg);
        opacity: 1;
      }
      75% {
        transform: translate(-50%, -50%) scale(1) rotate(980deg);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(0.85) rotate(1180deg);
        opacity: 0;
      }
    }

    @keyframes win-banner-pop {
      0% {
        transform: translateX(-50%) scale(0.4) rotate(-4deg);
        opacity: 0;
      }
      20% {
        transform: translateX(-50%) scale(1.08) rotate(2deg);
        opacity: 1;
      }
      75% {
        transform: translateX(-50%) scale(1) rotate(-1deg);
        opacity: 1;
      }
      100% {
        transform: translateX(-50%) scale(0.92) rotate(0deg);
        opacity: 0;
      }
    }

    @keyframes win-confetti-fall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(140%) rotate(720deg);
        opacity: 0;
      }
    }

    @keyframes confetti-drift {
      0% { transform: translateY(0); }
      100% { transform: translateY(15rem); }
    }

    @keyframes confetti-sway {
      0% { transform: rotate(12deg) translateY(0); }
      100% { transform: rotate(12deg) translateY(15rem); }
    }

    @media (max-width: 700px) {
      .page {
        width: min(100%, calc(100% - 0.5rem));
        padding: 0.35rem 0 1rem;
      }

      .hero-box {
        padding: 0.7rem;
        margin-bottom: 0.55rem;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .subtitle {
        margin-top: 0.5rem;
        padding: 0.55rem 0.7rem;
        border-radius: 18px;
        font-size: 0.78rem;
        line-height: 1.25;
      }

      .grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0.35rem;
      }

      .card {
        min-height: 0;
        padding: 0.35rem;
        border-radius: 18px;
      }

      .art {
        height: 44px;
        margin-bottom: 0;
        border-radius: 14px;
        font-size: 1.9rem;
      }

      .name,
      .game-name,
      .note {
        display: none;
      }

      .game-area {
        min-height: clamp(320px, 52svh, 410px);
        border-radius: 20px;
      }

      .bucket-zone {
        width: 31%;
      }

      .form-section {
        margin-top: 0.65rem;
        padding: 0.25rem;
        border-radius: 20px;
      }

      .form-frame {
        height: 700px;
      }

      #game-view .topbar {
        gap: 0.45rem;
        margin-bottom: 0.55rem;
      }

      #game-view .back,
      #game-view .pill,
      #game-view .action {
        padding: 0.62rem 0.78rem;
        font-size: 0.88rem;
      }

      #game-view .hero-box {
        padding: 0.7rem 0.65rem;
        margin-bottom: 0.55rem;
      }

      #game-view h1 {
        font-size: 1.35rem;
      }

      #hero-emoji {
        font-size: 2.3rem !important;
      }

      #game-view .subtitle {
        margin-top: 0.42rem;
        padding: 0.5rem 0.65rem;
        font-size: 0.76rem;
      }

      #game-view .action-row {
        gap: 0.45rem;
        margin-top: 0.65rem;
      }

      .game-shell {
        gap: 0.55rem;
      }

      .instructions,
      .message {
        padding: 0.72rem 0.82rem;
        border-radius: 18px;
        font-size: 0.88rem;
      }

      .message {
        min-height: 46px;
      }

      .start-placeholder {
        padding: 0.8rem;
      }

      .start-card {
        padding: 1rem 0.85rem;
        border-radius: 18px;
      }

      .start-emoji {
        font-size: 3.2rem;
      }

      .start-title {
        font-size: 1.2rem;
      }

      .start-text {
        font-size: 0.9rem;
      }

      .juggler,
      .rocket,
      .frog,
      .bucket {
        font-size: 2.4rem;
      }

      .ball,
      .rocket-item,
      .pop,
      .draggable,
      .cool-item {
        font-size: 1.75rem;
      }

      .pad {

I hope you enjoy!

  <script>
    const launcherView = document.getElementById("launcher-view");
    const gameView = document.getElementById("game-view");
    const launcherGrid = document.getElementById("launcher-grid");
    const backButton = document.getElementById("back-button");
    const gameArea = document.getElementById("game-area");
    const scorePill = document.getElementById("score-pill");
    const goalPill = document.getElementById("goal-pill");
    const heroEmoji = document.getElementById("hero-emoji");
    const heroTitle = document.getElementById("hero-title");
    const heroSubtitle = document.getElementById("hero-subtitle");
    const instructionsText = document.getElementById("instructions-text");
    const message = document.getElementById("message");
    const startButton = document.getElementById("start-button");
    const restartButton = document.getElementById("restart-button");
    let audioContext = null;

    const timers = [];
    const state = {
      score: 0,
      goal: 0,
      running: false,
      currentGameId: null
    };

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function schedule(fn, delay) {
      const id = setTimeout(fn, delay);
      timers.push(id);
      return id;
    }

    function clearTimers() {
      while (timers.length) {
        clearTimeout(timers.pop());
      }
    }

    function setScore(value, playSound = false) {
      state.score = value;
      scorePill.textContent = `Score: ${value}`;
      if (playSound) {
        playPointSound();
      }
    }

    function setGoal(value) {
      state.goal = value;
      goalPill.textContent = `Goal: ${value}`;
    }

    function setMessage(text, color) {
      message.textContent = text;
      message.style.color = color || "#d96b3b";
    }

    function resetArea(className) {
      clearTimers();
      state.running = false;
      gameArea.className = "game-area";
      if (className) {
        gameArea.classList.add(className);
      }
      gameArea.innerHTML = "";
      gameArea.onpointermove = null;
      gameArea.onpointerdown = null;
      document.onkeydown = null;
      setMessage("");
      setScore(0);
    }

    function showStartState(game) {
      resetArea(game.areaClass);
      setGoal(game.goal);
      startButton.classList.add("start-attention");
      gameArea.innerHTML = `
        <div class="start-placeholder">
          <div class="start-card">
            <div class="start-emoji">${game.emoji}</div>
            <div class="start-title">${game.title}</div>
            <p class="start-text">${game.instructions}</p>
            <p class="start-text">Press the big Start Game button above to begin.</p>
          </div>
        </div>
      `;
    }

    function win(text) {
      state.running = false;
      setMessage(text || "You did it!", "#2b9b63");
      playWinSound();
      showWinCelebration();
    }

    function lose(text) {
      state.running = false;
      const loseText = text || "Try again!";
      setMessage(loseText, "#d96b3b");
      playSadSound();
      showLoseOverlay(loseText);
    }

    function makeSprite(className, text, left, top) {
      const el = document.createElement("div");
      el.className = `sprite ${className}`;
      el.textContent = text;
      el.style.left = `${left}px`;
      el.style.top = `${top}px`;
      return el;
    }

    function getAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
      return audioContext;
    }

    function playBalloonPopSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(520, now);
      oscillator.frequency.exponentialRampToValueAtTime(120, now + 0.16);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1400, now);

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.exponentialRampToValueAtTime(0.14, now + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

      oscillator.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.start(now);
      oscillator.stop(now + 0.18);
    }

    function playPointSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.type = "triangle";
      oscillator.frequency.setValueAtTime(540, now);
      oscillator.frequency.exponentialRampToValueAtTime(860, now + 0.16);

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.exponentialRampToValueAtTime(0.08, now + 0.02);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.start(now);
      oscillator.stop(now + 0.18);
    }

    function playSadSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const oscillator = ctx.createOscillator();
      const gainNode = ctx.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(330, now);
      oscillator.frequency.exponentialRampToValueAtTime(170, now + 0.55);

      gainNode.gain.setValueAtTime(0.0001, now);
      gainNode.gain.exponentialRampToValueAtTime(0.12, now + 0.03);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.62);

      oscillator.connect(gainNode);
      gainNode.connect(ctx.destination);
      oscillator.start(now);
      oscillator.stop(now + 0.62);
    }

    function playWinSound() {
      const ctx = getAudioContext();
      const now = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5];

      notes.forEach((note, index) => {
        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.type = "triangle";
        oscillator.frequency.setValueAtTime(note, now + index * 0.12);
        gainNode.gain.setValueAtTime(0.0001, now + index * 0.12);
        gainNode.gain.exponentialRampToValueAtTime(0.1, now + index * 0.12 + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.12 + 0.32);

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);
        oscillator.start(now + index * 0.12);
        oscillator.stop(now + index * 0.12 + 0.32);
      });
    }

    function showBalloonBurst(x, y, good) {
      const burst = document.createElement("div");
      burst.className = "balloon-burst";
      burst.style.left = `${x - 45}px`;
      burst.style.top = `${y - 45}px`;

      const colors = good
        ? ["#ff5d73", "#ffb703", "#84d8ff", "#9be7c4", "#ffffff"]
        : ["#2c2c2c", "#6b7280", "#9ca3af", "#ef4444", "#ffffff"];

      for (let i = 0; i < 10; i += 1) {
        const spark = document.createElement("div");
        spark.className = "balloon-spark";
        spark.style.setProperty("--angle", `${i * 36}deg`);
        spark.style.background = colors[i % colors.length];
        burst.appendChild(spark);
      }

      gameArea.appendChild(burst);
      schedule(() => burst.remove(), 560);
    }

    function showWinCelebration() {
      const existing = gameArea.querySelector(".win-overlay");
      if (existing) {
        existing.remove();
      }

      const overlay = document.createElement("div");
      overlay.className = "win-overlay";

      const banner = document.createElement("div");
      banner.className = "win-banner";
      banner.textContent = "You won!!";
      overlay.appendChild(banner);

      const trophy = document.createElement("div");
      trophy.className = "win-trophy";
      trophy.textContent = "🏆";
      overlay.appendChild(trophy);

      const colors = ["#ff5d73", "#ffb703", "#84d8ff", "#9be7c4", "#c89bff", "#ffffff"];
      for (let i = 0; i < 42; i += 1) {
        const piece = document.createElement("div");
        piece.className = "win-confetti";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${Math.random() * 0.45}s`;
        piece.style.animationDuration = `${2.4 + Math.random() * 1.1}s`;
        piece.style.transform = `translateY(0) rotate(${Math.random() * 180}deg)`;
        overlay.appendChild(piece);
      }

      gameArea.appendChild(overlay);
      schedule(() => {
        overlay.remove();
      }, 3000);
    }

    function restartCurrentGame() {
      const game = games[state.currentGameId];
      if (game) {
        getAudioContext();
        startButton.classList.remove("start-attention");
        game.start();
      }
    }

    function showLoseOverlay(text) {
      const existing = gameArea.querySelector(".lose-overlay");
      if (existing) {
        existing.remove();
      }

      const overlay = document.createElement("div");
      overlay.className = "lose-overlay";
      overlay.innerHTML = `
        <div class="lose-card">
          <p class="lose-banner">Game Over</p>
          <p class="lose-text">${text}</p>
          <button class="action primary lose-restart" type="button">Restart</button>
        </div>
      `;

      overlay.querySelector(".lose-restart").addEventListener("click", (event) => {
        event.stopPropagation();
        overlay.remove();
        restartCurrentGame();
      });

      gameArea.appendChild(overlay);
    }

    function enableSimpleDrag(element, onDrop) {
      let dragging = false;

      element.addEventListener("pointerdown", (event) => {
        dragging = true;
        element.setPointerCapture(event.pointerId);
      });

      element.addEventListener("pointermove", (event) => {
        if (!dragging || !state.running) {
          return;
        }
        const rect = gameArea.getBoundingClientRect();
        const x = event.clientX - rect.left - element.offsetWidth / 2;
        const y = event.clientY - rect.top - element.offsetHeight / 2;
        element.style.left = `${Math.max(6, Math.min(gameArea.clientWidth - element.offsetWidth - 6, x))}px`;
        element.style.top = `${Math.max(6, Math.min(gameArea.clientHeight - element.offsetHeight - 6, y))}px`;
      });

      element.addEventListener("pointerup", () => {
        dragging = false;
        onDrop();
      });

      element.addEventListener("pointercancel", () => {
        dragging = false;
      });
    }

    function generateFrogPads(count = 6) {
      const pads = [];
      for (let i = 0; i < count; i += 1) {
        const baseX = 0.16 + i * 0.14;
        const x = Math.min(0.88, baseX + randomBetween(-0.02, 0.03));
        const y = randomBetween(0.42, 0.78);
        pads.push({ x, y });
      }
      return pads;
    }

    function generateUnicornMaze() {
      const size = 5;
      let path = [];

      while (path.length < 10) {
        const start = Math.floor(Math.random() * (size * size));
        path = [start];
        const visited = new Set(path);

        while (path.length < 12) {
          const current = path[path.length - 1];
          const row = Math.floor(current / size);
          const col = current % size;
          const candidates = [];

          if (col > 0) {
            candidates.push(current - 1);
          }
          if (col < size - 1) {
            candidates.push(current + 1);
          }
          if (row > 0) {
            candidates.push(current - size);
          }
          if (row < size - 1) {
            candidates.push(current + size);
          }

          const nextOptions = candidates.filter((cell) => !visited.has(cell));
          if (!nextOptions.length) {
            break;
          }

          const next = nextOptions[Math.floor(Math.random() * nextOptions.length)];
          path.push(next);
          visited.add(next);
        }
      }

      const sparkleCandidates = [...path.slice(1)];
      const sparkleSet = new Set();
      while (sparkleSet.size < 5 && sparkleCandidates.length) {
        const pickIndex = Math.floor(Math.random() * sparkleCandidates.length);
        sparkleSet.add(sparkleCandidates.splice(pickIndex, 1)[0]);
      }

      const pathSet = new Set(path);
      const freeCells = Array.from({ length: size * size }, (_, index) => index).filter((cell) => !pathSet.has(cell));
      const wallSet = new Set();
      while (wallSet.size < 6 && freeCells.length) {
        const pickIndex = Math.floor(Math.random() * freeCells.length);
        wallSet.add(freeCells.splice(pickIndex, 1)[0]);
      }

      return {
        size,
        start: path[0],
        sparkleSet,
        wallSet
      };
    }

    const games = {
      juggler: {
        emoji: "🤹",
        title: "Juggler",
        gameName: "Keep the balls up",
        note: "Tap the falling balls before they hit the floor.",
        subtitle: "Tap the falling balls before they hit the floor.",
        instructions: "Press Start. Balls drop from the top. Tap each one before it reaches the bottom. Catch 12 to win.",
        goal: 12,
        areaClass: "sky",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const floor = document.createElement("div");
          floor.className = "floor";
          const juggler = document.createElement("div");
          juggler.className = "sprite juggler";
          juggler.textContent = "🤹";
          gameArea.append(floor, juggler);

          const colors = ["🔴", "🟡", "🔵", "🟢"];
          let missed = 0;

          function dropBall() {
            if (!state.running) {
              return;
            }

            const ball = document.createElement("div");
            ball.className = "sprite ball";
            ball.textContent = colors[Math.floor(Math.random() * colors.length)];
            const centerX = gameArea.clientWidth / 2;
            ball.style.left = `${randomBetween(centerX - 70, centerX + 30)}px`;
            ball.style.top = "-10px";
            gameArea.appendChild(ball);

            let top = -10;
            const speed = randomBetween(1.1, 1.8);
            const interval = setInterval(() => {
              if (!state.running) {
                clearInterval(interval);
                ball.remove();
                return;
              }

              top += speed;
              ball.style.top = `${top}px`;
              if (top > gameArea.clientHeight - 70) {
                clearInterval(interval);
                ball.remove();
                missed += 1;
                if (missed >= 3) {
                  lose("Three balls escaped. The circus needs another try.");
                }
              }
            }, 16);

            ball.addEventListener("pointerdown", () => {
              if (!state.running) {
                return;
              }
              clearInterval(interval);
              ball.remove();
              setScore(state.score + 1, true);
              if (state.score >= state.goal) {
                win("Amazing juggling. All the balls stayed up!");
              }
            });

            schedule(dropBall, randomBetween(480, 820));
          }

          dropBall();
        }
      },
      rocket: {
        emoji: "🚀",
        title: "Rocket",
        gameName: "Fly through space",
        note: "Collect stars and dodge floating junk.",
        subtitle: "Drag the rocket up and down to collect stars.",
        instructions: "Press Start. Move the rocket with your finger or mouse. Collect 10 stars. If you hit 3 space junk pieces, the mission ends.",
        goal: 10,
        areaClass: "space",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const rocket = document.createElement("div");
          rocket.className = "sprite rocket";
          rocket.textContent = "🚀";
          gameArea.appendChild(rocket);

          let rocketY = gameArea.clientHeight / 2;
          let hits = 0;

          function clampRocket(y) {
            rocketY = Math.max(20, Math.min(gameArea.clientHeight - 90, y));
            rocket.style.top = `${rocketY}px`;
          }

          clampRocket(rocketY);

          function moveRocket(event) {
            if (!state.running) {
              return;
            }
            const rect = gameArea.getBoundingClientRect();
            clampRocket(event.clientY - rect.top - 20);
          }

          gameArea.onpointermove = moveRocket;
          gameArea.onpointerdown = moveRocket;
          document.onkeydown = (event) => {
            if (!state.running) {
              return;
            }
            if (event.key === "ArrowUp") {
              clampRocket(rocketY - 30);
            }
            if (event.key === "ArrowDown") {
              clampRocket(rocketY + 30);
            }
          };

          function spawnItem() {
            if (!state.running) {
              return;
            }

            const isStar = Math.random() > 0.35;
            const item = document.createElement("div");
            item.className = "sprite rocket-item";
            item.textContent = isStar ? "⭐" : "🛰️";
            let x = gameArea.clientWidth + 20;
            const y = randomBetween(30, gameArea.clientHeight - 80);
            item.style.left = `${x}px`;
            item.style.top = `${y}px`;
            gameArea.appendChild(item);

            const interval = setInterval(() => {
              if (!state.running) {
                clearInterval(interval);
                item.remove();
                return;
              }

              x -= isStar ? 4.2 : 5.2;
              item.style.left = `${x}px`;

              const rx = 24;
              const ry = rocketY + 20;
              if (Math.abs(x - rx) < 34 && Math.abs(y - ry) < 42) {
                clearInterval(interval);
                item.remove();
                if (isStar) {
                  setScore(state.score + 1, true);
                  if (state.score >= state.goal) {
                    win("Rocket mission complete. The stars are cheering.");
                  }
                } else {
                  hits += 1;
                  setMessage(`Bonk. Space junk hits: ${hits}/3`);
                  if (hits >= 3) {
                    lose("Too much space junk. The rocket needs repairs.");
                  }
                }
              }

              if (x < -40) {
                clearInterval(interval);
                item.remove();
              }
            }, 16);

            schedule(spawnItem, randomBetween(700, 1000));
          }

          spawnItem();
        }
      },
      frog: {
        emoji: "🐸",
        title: "Frog",
        gameName: "Lily pad leap",
        note: "Hop across the pond without splashing in.",
        subtitle: "Tap the next lily pad to cross the pond.",
        instructions: "Press Start. Tap the glowing lily pads in order from left to right. Each round makes a new hopping path.",
        goal: 6,
        areaClass: "pond",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const frog = document.createElement("div");
          frog.className = "sprite frog";
          frog.textContent = "🐸";
          gameArea.appendChild(frog);

          const pads = generateFrogPads(this.goal);
          const padElements = [];

          let current = 0;
          setMessage("Tap the first lily pad to start hopping.", "#17324d");

          function updatePadHighlights() {
            padElements.forEach((pad, index) => {
              if (index === current) {
                pad.style.boxShadow = "0 0 0 5px rgba(255, 255, 255, 0.72), inset -10px -4px rgba(0, 0, 0, 0.08)";
                pad.style.transform = "scale(1.06)";
              } else {
                pad.style.boxShadow = "inset -10px -4px rgba(0, 0, 0, 0.08)";
                pad.style.transform = "scale(1)";
              }
            });
          }

          pads.forEach((padData, index) => {
            const left = Math.max(18, Math.min(gameArea.clientWidth - 88, gameArea.clientWidth * padData.x - 36));
            const top = Math.max(90, Math.min(gameArea.clientHeight - 80, gameArea.clientHeight * padData.y - 16));

            if (index === 0) {
              frog.style.left = `${Math.max(8, left - 56)}px`;
              frog.style.top = `${Math.min(gameArea.clientHeight - 70, top + 6)}px`;
            }

            const pad = document.createElement("div");
            pad.className = "sprite pad";
            pad.style.left = `${left}px`;
            pad.style.top = `${top}px`;
            pad.textContent = String(index + 1);
            pad.addEventListener("pointerdown", (event) => {
              event.stopPropagation();
              if (!state.running || index !== current) {
                setMessage("Try the next pad in order.");
                return;
              }

              frog.style.left = `${left + 18}px`;
              frog.style.top = `${top - 44}px`;
              current += 1;
              setScore(current, true);
              updatePadHighlights();
              setMessage(current < pads.length ? `Nice hop. Now tap lily pad ${current + 1}.` : "", "#17324d");
              if (current === pads.length) {
                win("Splash-free success. Frog champion!");
              }
            });
            padElements.push(pad);
            gameArea.appendChild(pad);
          });

          updatePadHighlights();
        }
      },
      octopus: {
        emoji: "🐙",
        title: "Octopus",
        gameName: "Sea sorter",
        note: "Drag ocean things into the matching buckets.",
        subtitle: "Move the ocean goodies into the right buckets.",
        instructions: "Press Start. Drag each item into the matching bucket: shell with shell, fish with fish, treasure with treasure. Sort all 9 to win.",
        goal: 9,
        areaClass: "ocean",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const octopus = document.createElement("div");
          octopus.className = "sprite";
          octopus.textContent = "🐙";
          octopus.style.left = "50%";
          octopus.style.top = "14px";
          octopus.style.transform = "translateX(-50%)";
          octopus.style.fontSize = "4rem";
          gameArea.appendChild(octopus);

          const zones = [
            { key: "shell", label: "Shell Bucket", emoji: "🐚", left: "4%" },
            { key: "fish", label: "Fish Bucket", emoji: "🐟", left: "36%" },
            { key: "treasure", label: "Treasure Bucket", emoji: "💰", left: "68%" }
          ];

          zones.forEach((zone) => {
            const el = document.createElement("div");
            el.className = "bucket-zone";
            el.dataset.key = zone.key;
            el.style.left = zone.left;
            el.innerHTML = `<div class="bucket-emoji">${zone.emoji}</div>${zone.label}`;
            gameArea.appendChild(el);
          });

          const items = [
            ["shell", "🐚"], ["shell", "🦪"], ["shell", "🐚"],
            ["fish", "🐠"], ["fish", "🐟"], ["fish", "🐡"],
            ["treasure", "💰"], ["treasure", "💎"], ["treasure", "🪙"]
          ];

          items.forEach(([kind, emoji], index) => {
            const item = document.createElement("div");
            item.className = "sprite draggable";
            item.textContent = emoji;
            item.dataset.kind = kind;
            item.style.left = `${40 + (index % 3) * 90}px`;
            item.style.top = `${110 + Math.floor(index / 3) * 72}px`;
            gameArea.appendChild(item);

            enableSimpleDrag(item, () => {
              if (!state.running) {
                return;
              }

              const itemRect = item.getBoundingClientRect();
              const hitZone = [...gameArea.querySelectorAll(".bucket-zone")].find((zone) => {
                const rect = zone.getBoundingClientRect();
                const centerX = itemRect.left + itemRect.width / 2;
                const centerY = itemRect.top + itemRect.height / 2;
                return centerX >= rect.left && centerX <= rect.right && centerY >= rect.top && centerY <= rect.bottom;
              });

              if (!hitZone) {
                return;
              }

              if (hitZone.dataset.key === kind) {
                item.remove();
                setScore(state.score + 1, true);
                if (state.score >= state.goal) {
                  win("Ocean sorting complete. Octopus is impressed.");
                }
              } else {
                setMessage("Wrong bucket. Try a different one.");
              }
            });
          });
        }
      },
      unicorn: {
        emoji: "🦄",
        title: "Unicorn",
        gameName: "Rainbow maze",
        note: "Collect all the sparkles before the maze is empty.",
        subtitle: "Tap next-door squares to collect the sparkles.",
        instructions: "Press Start. Tap a square next to the unicorn to move. Collect all 5 sparkles. The maze changes every time.",
        goal: 5,
        areaClass: "rainbow",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const stage = document.createElement("div");
          stage.className = "center-stage maze-stage";
          const grid = document.createElement("div");
          grid.className = "maze-grid";
          stage.appendChild(grid);
          gameArea.appendChild(stage);

          const maze = generateUnicornMaze();
          const size = maze.size;
          let unicornIndex = maze.start;
          const sparkleSet = new Set(maze.sparkleSet);
          const wallSet = new Set(maze.wallSet);

          function render() {
            grid.innerHTML = "";
            Array.from({ length: size * size }, (_, index) => index).forEach((index) => {
              const cell = document.createElement("button");
              cell.type = "button";
              cell.className = "maze-cell";

              if (wallSet.has(index)) {
                cell.classList.add("wall");
                cell.disabled = true;
              } else if (index === unicornIndex) {
                cell.textContent = "🦄";
              } else if (sparkleSet.has(index)) {
                cell.classList.add("sparkle");
                cell.textContent = "✨";
              }

              cell.addEventListener("pointerdown", () => {
                if (!state.running || wallSet.has(index)) {
                  return;
                }
                const sameRowLeft = index === unicornIndex - 1 && Math.floor(index / size) === Math.floor(unicornIndex / size);
                const sameRowRight = index === unicornIndex + 1 && Math.floor(index / size) === Math.floor(unicornIndex / size);
                const verticalMove = index === unicornIndex - size || index === unicornIndex + size;
                const allowed = sameRowLeft || sameRowRight || verticalMove;
                if (!allowed) {
                  setMessage("The unicorn can only move one square.");
                  return;
                }

                unicornIndex = index;
                if (sparkleSet.has(index)) {
                  sparkleSet.delete(index);
                  setScore(state.score + 1, true);
                }
                render();
                if (sparkleSet.size === 0) {
                  win("Rainbow maze complete. Sparkles saved.");
                }
              });

              grid.appendChild(cell);
            });
          }

          render();
        }
      },
      pizza: {
        emoji: "🍕",
        title: "Pizza Builder",
        gameName: "Top the pizza",
        note: "Put the right toppings in the right places.",
        subtitle: "Drag the toppings onto the matching pizza spots.",
        instructions: "Press Start. Move the toppings onto the matching symbols on the pizza. Finish all 4 to serve the pie.",
        goal: 4,
        areaClass: "kitchen",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const base = document.createElement("div");
          base.className = "pizza-base";
          gameArea.appendChild(base);

          const tray = document.createElement("div");
          tray.className = "tray";
          gameArea.appendChild(tray);

          const toppings = [
            { key: "pepperoni", emoji: "🔴", icon: "🔴", x: "50%", y: "30%" },
            { key: "mushroom", emoji: "🍄", icon: "🍄", x: "28%", y: "56%" },
            { key: "olive", emoji: "🫒", icon: "🫒", x: "72%", y: "52%" },
            { key: "pepper", emoji: "🫑", icon: "🫑", x: "50%", y: "74%" }
          ];

          toppings.forEach((top, index) => {
            const slot = document.createElement("div");
            slot.className = "pizza-slot";
            slot.dataset.key = top.key;
            slot.style.left = top.x;
            slot.style.top = top.y;
            slot.textContent = top.icon;
            base.appendChild(slot);

            const item = document.createElement("div");
            item.className = "sprite draggable";
            item.textContent = top.emoji;
            item.dataset.key = top.key;
            item.style.left = `${40 + index * 76}px`;
            item.style.top = `${gameArea.clientHeight - 80}px`;
            gameArea.appendChild(item);

            enableSimpleDrag(item, () => {
              if (!state.running) {
                return;
              }
              const itemRect = item.getBoundingClientRect();
              const slotRect = slot.getBoundingClientRect();
              const centerX = itemRect.left + itemRect.width / 2;
              const centerY = itemRect.top + itemRect.height / 2;
              const hit = centerX >= slotRect.left && centerX <= slotRect.right && centerY >= slotRect.top && centerY <= slotRect.bottom;

              if (hit && item.dataset.key === slot.dataset.key) {
                slot.textContent = item.textContent;
                item.remove();
                setScore(state.score + 1, true);
                if (state.score >= state.goal) {
                  win("Pizza complete. Delivery level: delicious.");
                }
              } else if (hit) {
                setMessage("That topping belongs somewhere else.");
              }
            });
          });
        }
      },
      disco: {
        emoji: "🪩",
        title: "Disco Memory",
        gameName: "Copy the beat",
        note: "Watch the flashing pattern and tap it back.",
        subtitle: "Repeat the disco light pattern.",
        instructions: "Press Start. Watch the flashing colors. Repeat the pattern by tapping the pads in the same order. Finish 4 rounds to win.",
        goal: 4,
        areaClass: "club",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const stage = document.createElement("div");
          stage.className = "center-stage";
          const grid = document.createElement("div");
          grid.className = "memory-grid";
          stage.appendChild(grid);
          gameArea.appendChild(stage);

          const colors = ["#ff5b84", "#ffd84a", "#67e0c0", "#62b7ff"];
          const pads = [];
          let sequence = [];
          let player = [];
          let round = 0;
          let locked = true;

          function flash(index) {
            pads[index].classList.add("active");
            schedule(() => pads[index].classList.remove("active"), 350);
          }

          function showSequence() {
            locked = true;
            sequence.forEach((value, index) => {
              schedule(() => flash(value), 500 + index * 520);
            });
            schedule(() => {
              locked = false;
              player = [];
              setMessage("Your turn. Copy the pattern.", "#17324d");
            }, 500 + sequence.length * 520);
          }

          function nextRound() {
            round += 1;
            setScore(round - 1);
            if (round > state.goal) {
              win("Disco legend. The crowd wants an encore.");
              return;
            }
            setMessage(`Round ${round}. Watch carefully.`, "#17324d");
            sequence.push(Math.floor(Math.random() * 4));
            showSequence();
          }

          colors.forEach((color, index) => {
            const pad = document.createElement("button");
            pad.type = "button";
            pad.className = "memory-pad";
            pad.style.background = color;
            pad.addEventListener("pointerdown", () => {
              if (!state.running || locked) {
                return;
              }
              flash(index);
              player.push(index);
              const current = player.length - 1;
              if (player[current] !== sequence[current]) {
                lose("Oops. The dance pattern got mixed up.");
                return;
              }
              if (player.length === sequence.length) {
                setScore(round, true);
                if (round >= state.goal) {
                  win("Disco legend. The crowd wants an encore.");
                } else {
                  schedule(nextRound, 600);
                }
              }
            });
            pads.push(pad);
            grid.appendChild(pad);
          });

          nextRound();
        }
      },
      clown: {
        emoji: "🤡",
        title: "Balloon Bop",
        gameName: "Pop the right balloons",
        note: "Pop the happy balloons and avoid the prank ones.",
        subtitle: "Tap good balloons and skip the trick ones.",
        instructions: "Press Start. Tap the good balloons. Do not tap the skull balloons. Pop 10 good balloons to win.",
        goal: 10,
        areaClass: "circus",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          let badPops = 0;

          function spawnBalloon() {
            if (!state.running) {
              return;
            }

            const good = Math.random() > 0.28;
            const balloon = document.createElement("div");
            balloon.className = "sprite balloon";
            balloon.textContent = good ? "🎈" : "💀";
            balloon.style.left = `${randomBetween(10, gameArea.clientWidth - 60)}px`;
            balloon.style.top = `${gameArea.clientHeight - 40}px`;
            balloon.style.animationDelay = `${Math.random()}s`;
            gameArea.appendChild(balloon);

            let top = gameArea.clientHeight - 40;
            const speed = randomBetween(1.5, 2.8);
            const interval = setInterval(() => {
              if (!state.running) {
                clearInterval(interval);
                balloon.remove();
                return;
              }
              top -= speed;
              balloon.style.top = `${top}px`;
              if (top < -30) {
                clearInterval(interval);
                balloon.remove();
              }
            }, 16);

            balloon.addEventListener("pointerdown", (event) => {
              if (!state.running) {
                return;
              }
              const rect = gameArea.getBoundingClientRect();
              const burstX = event.clientX - rect.left;
              const burstY = event.clientY - rect.top;
              clearInterval(interval);
              playBalloonPopSound();
              showBalloonBurst(burstX, burstY, good);
              balloon.remove();
              if (good) {
                setScore(state.score + 1, true);
                if (state.score >= state.goal) {
                  win("Balloon bop master. No prank got past you.");
                }
              } else {
                badPops += 1;
                if (badPops >= 2) {
                  lose("Too many prank balloons popped.");
                } else {
                  setMessage("That was a prank balloon. One more and the clown wins.");
                }
              }
            });

            schedule(spawnBalloon, randomBetween(420, 760));
          }

          spawnBalloon();
        }
      },
      popcorn: {
        emoji: "🍿",
        title: "Catch The Pops",
        gameName: "Catch the popcorn",
        note: "Move the bucket and catch the flying popcorn.",
        subtitle: "Slide the bucket left and right to catch popcorn.",
        instructions: "Press Start. Drag or move left and right to slide the bucket. Catch 12 popcorn pieces before 4 fall away.",
        goal: 12,
        areaClass: "movie",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          let misses = 0;
          const bucket = document.createElement("div");
          bucket.className = "sprite bucket";
          bucket.textContent = "🪣";
          gameArea.appendChild(bucket);

          let bucketX = gameArea.clientWidth / 2;

          function moveBucket(event) {
            const rect = gameArea.getBoundingClientRect();
            bucketX = Math.max(28, Math.min(gameArea.clientWidth - 28, event.clientX - rect.left));
            bucket.style.left = `${bucketX}px`;
          }

          gameArea.onpointermove = moveBucket;
          gameArea.onpointerdown = moveBucket;
          document.onkeydown = (event) => {
            if (!state.running) {
              return;
            }
            if (event.key === "ArrowLeft") {
              bucketX = Math.max(28, bucketX - 36);
              bucket.style.left = `${bucketX}px`;
            }
            if (event.key === "ArrowRight") {
              bucketX = Math.min(gameArea.clientWidth - 28, bucketX + 36);
              bucket.style.left = `${bucketX}px`;
            }
          };

          function spawnPop() {
            if (!state.running) {
              return;
            }

            const pop = document.createElement("div");
            pop.className = "sprite pop";
            pop.textContent = "🍿";
            const x = randomBetween(20, gameArea.clientWidth - 30);
            let y = 20;
            const speed = randomBetween(1.4, 2.1);
            pop.style.left = `${x}px`;
            pop.style.top = `${y}px`;
            gameArea.appendChild(pop);

            function catchPop() {
              clearInterval(interval);
              pop.remove();
              setScore(state.score + 1, true);
              if (state.score >= state.goal) {
                win("Snack time victory. Every pop found the bucket.");
              }
            }

            pop.addEventListener("pointerdown", (event) => {
              event.stopPropagation();
              if (!state.running) {
                return;
              }
              catchPop();
            });

            const interval = setInterval(() => {
              if (!state.running) {
                clearInterval(interval);
                pop.remove();
                return;
              }
              y += speed;
              pop.style.top = `${y}px`;
              if (y > gameArea.clientHeight - 64) {
                clearInterval(interval);
                const caught = Math.abs(x - bucketX) < 34;
                pop.remove();
                if (caught) {
                  setScore(state.score + 1, true);
                  if (state.score >= state.goal) {
                    win("Snack time victory. Every pop found the bucket.");
                  }
                } else {
                  misses += 1;
                  if (misses >= 4) {
                    lose("Too much popcorn escaped to the floor.");
                  } else {
                    setMessage(`Missed popcorn: ${misses}/4`);
                  }
                }
              }
            }, 16);

            schedule(spawnPop, randomBetween(460, 760));
          }

          spawnPop();
        }
      },
      melty: {
        emoji: "🫠",
        title: "Cool Me Down",
        gameName: "Save the melty face",
        note: "Grab ice, fans, and shade before it fully melts.",
        subtitle: "Tap cool items before the heat bar fills up.",
        instructions: "Press Start. Tap the ice, fans, and umbrellas to cool the melty face. Fill the cool score with 10 helpers before the heat bar reaches the end.",
        goal: 10,
        areaClass: "sunny",
        start() {
          resetArea(this.areaClass);
          setGoal(this.goal);
          state.running = true;

          const center = document.createElement("div");
          center.className = "center-stage";
          const melty = document.createElement("div");
          melty.textContent = "🫠";
          melty.style.fontSize = "5rem";
          center.appendChild(melty);
          gameArea.appendChild(center);

          const heatBar = document.createElement("div");
          heatBar.className = "heat-bar";
          heatBar.innerHTML = '<div class="heat-fill"></div>';
          gameArea.appendChild(heatBar);
          const heatFill = heatBar.querySelector(".heat-fill");

          let heat = 0;

          function spawnCoolItem() {
            if (!state.running) {
              return;
            }

            const helpers = ["🧊", "🪭", "☂️"];
            const item = document.createElement("div");
            item.className = "sprite cool-item";
            item.textContent = helpers[Math.floor(Math.random() * helpers.length)];
            item.style.left = `${randomBetween(20, gameArea.clientWidth - 50)}px`;
            item.style.top = `${randomBetween(90, gameArea.clientHeight - 80)}px`;
            gameArea.appendChild(item);

            const lifetime = schedule(() => item.remove(), 1800);
            item.addEventListener("pointerdown", () => {
              if (!state.running) {
                return;
              }
              clearTimeout(lifetime);
              item.remove();
              setScore(state.score + 1, true);
              heat = Math.max(0, heat - 12);
              heatFill.style.width = `${heat}%`;
              if (state.score >= state.goal) {
                win("The melty face survived the sun. Cool job.");
              }
            });

            schedule(spawnCoolItem, randomBetween(520, 760));
          }

          function heatTick() {
            if (!state.running) {
              return;
            }
            heat += 2.1;
            heatFill.style.width = `${Math.min(heat, 100)}%`;
            if (heat >= 100) {
              lose("Oh no. Total puddle mode.");
              return;
            }
            schedule(heatTick, 180);
          }

          spawnCoolItem();
          heatTick();
        }
      }
    };

    function renderLauncher() {
      launcherGrid.innerHTML = "";
      Object.entries(games).forEach(([id, game]) => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = "card";
        card.innerHTML = `
          <div class="art">${game.emoji}</div>
          <p class="name">${game.title}</p>
          <p class="game-name">${game.gameName}</p>
          <p class="note">${game.note}</p>
        `;
        card.addEventListener("click", () => openGame(id));
        launcherGrid.appendChild(card);
      });
    }

    function openGame(id) {
      const game = games[id];
      if (!game) {
        return;
      }

      state.currentGameId = id;
      launcherView.classList.add("hide");
      gameView.classList.remove("hide");
      heroEmoji.textContent = game.emoji;
      heroTitle.textContent = game.title;
      heroSubtitle.textContent = game.subtitle;
      instructionsText.textContent = game.instructions;
      showStartState(game);
    }

    function goHome() {
      clearTimers();
      state.running = false;
      launcherView.classList.remove("hide");
      gameView.classList.add("hide");
      gameArea.innerHTML = "";
      gameArea.className = "game-area";
      gameArea.onpointermove = null;
      gameArea.onpointerdown = null;
      document.onkeydown = null;
      setMessage("");
    }

    startButton.addEventListener("click", () => {
      const game = games[state.currentGameId];
      if (game) {
        getAudioContext();
        startButton.classList.remove("start-attention");
        game.start();
      }
    });

    restartButton.addEventListener("click", () => {
      const game = games[state.currentGameId];
      if (game) {
        getAudioContext();
        startButton.classList.remove("start-attention");
        game.start();
      }
    });

    backButton.addEventListener("click", goHome);

    renderLauncher();
  </script>
</body>
</html>
